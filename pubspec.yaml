name: attendid
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  
  # Essential UI packages
  google_fonts: ^6.1.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  excel: ^4.0.0
  path_provider: ^2.1.1
  share_plus: ^7.2.0
  rxdart: ^0.27.7
  
 
  firebase_core: 2.24.2
  firebase_auth: 4.16.0      
  cloud_firestore: 4.14.0    
  google_sign_in: 6.1.6      

  
  # NFC & Device packages
  nfc_manager: ^3.3.0
  nfc_host_card_emulation: ^1.1.0
  device_info_plus: ^9.1.1    

  # QR for fallback
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
