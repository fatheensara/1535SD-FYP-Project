name: fyp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Utilities ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  audioplayers: ^6.0.0
  intl: ^0.18.1
  excel: ^4.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  share_plus: ^7.2.0
  rxdart: ^0.27.7
  file_picker: ^8.0.0

  # --- Firebase ---
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  google_sign_in: ^6.1.6

  # --- NFC & Device ---
  nfc_manager: ^3.3.0
  nfc_host_card_emulation: ^1.1.0
  device_info_plus: ^9.1.1

  # --- QR Code ---
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# --- FLUTTER CONFIGURATION (Must be separate from dependencies) ---
flutter:
  uses-material-design: true

  # Assets section
  assets:
    - assets/IIUM_TAWHIDIC_UMMATIC_KHALIFAH.png